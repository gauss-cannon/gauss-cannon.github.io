<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Cañón de Gauss</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Black+Ops+One&display=swap');

:root {
  --bg: #07090f;
  --panel: rgba(7,12,22,0.96);
  --amber: #ff8c2a;
  --amber-dim: rgba(255,140,42,0.25);
  --teal: #00d9b0;
  --teal-dim: rgba(0,217,176,0.15);
  --red: #ff4040;
  --text: #b4ccd8;
  --text-dim: rgba(180,204,216,0.45);
  --border: rgba(0,217,176,0.18);
  --border-a: rgba(255,140,42,0.28);
  --glow-a: 0 0 24px rgba(255,140,42,0.35);
  --glow-t: 0 0 24px rgba(0,217,176,0.35);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Rajdhani',sans-serif;color:var(--text);touch-action:none;user-select:none}
canvas{display:block;touch-action:none}

/* ── CUSTOM SCROLLBARS ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:rgba(0,217,176,0.04);border-radius:3px}
::-webkit-scrollbar-thumb{background:rgba(0,217,176,0.28);border-radius:3px;transition:background .2s}
::-webkit-scrollbar-thumb:hover{background:rgba(0,217,176,0.55)}
::-webkit-scrollbar-corner{background:transparent}
* { scrollbar-width:thin; scrollbar-color:rgba(0,217,176,0.28) rgba(0,217,176,0.04); }

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;z-index:100;
  background:rgba(7,9,15,0.94);
  border-bottom:1px solid rgba(0,217,176,0.12);
  backdrop-filter:blur(20px);
}
#nav-brand{line-height:1.1;flex-shrink:0}
#nav-title{
  font-family:'Black Ops One',serif;font-size:1.05rem;
  color:var(--amber);letter-spacing:0.06em;
  text-shadow:0 0 16px rgba(255,140,42,0.5);
}
#nav-sub{font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-dim);margin-top:1px}

/* Desktop nav buttons */
#nav-btns{display:flex;gap:8px}
.nbtn{
  display:flex;align-items:center;gap:7px;
  padding:7px 13px;
  background:var(--teal-dim);border:1px solid var(--border);border-radius:3px;
  color:var(--teal);font-family:'Rajdhani',sans-serif;font-size:0.77rem;
  font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.nbtn:hover{background:rgba(0,217,176,0.2);border-color:var(--teal);box-shadow:var(--glow-t)}
.nbtn.nbtn-amber{background:rgba(255,140,42,0.12);border-color:var(--border-a);color:var(--amber)}
.nbtn.nbtn-amber:hover{background:rgba(255,140,42,0.22);border-color:var(--amber);box-shadow:var(--glow-a)}
.nbtn svg{flex-shrink:0}

/* Hide desktop nav on mobile, show bottom bar */
@media(max-width:640px){
  #nav-btns{display:none}
}

/* ── MOBILE BOTTOM NAV ── */
#mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(7,9,15,0.97);
  border-top:1px solid rgba(0,217,176,0.14);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  padding:6px 0 calc(6px + env(safe-area-inset-bottom));
}
@media(max-width:640px){#mobile-nav{display:flex}}
.mnav-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  width:100%;
}
.mnbtn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:8px 4px;border:none;background:none;cursor:pointer;
  color:rgba(0,217,176,0.55);font-family:'Rajdhani',sans-serif;
  font-size:0.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  transition:color .2s;
  -webkit-tap-highlight-color:transparent;
}
.mnbtn:active,.mnbtn:hover{color:var(--teal)}
.mnbtn.amber{color:rgba(255,140,42,0.55)}
.mnbtn.amber:active,.mnbtn.amber:hover{color:var(--amber)}
.mnbtn svg{width:18px;height:18px}


/* ── HINT ── */
#hint{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;text-align:center;
  transition:opacity .8s;
}
#hint-inner{
  display:inline-flex;align-items:center;gap:10px;
  font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(180,204,216,0.32);
  border:1px solid rgba(255,140,42,0.1);padding:6px 18px;border-radius:20px;
  backdrop-filter:blur(8px);background:rgba(7,9,15,0.35);
}
.hdot{width:5px;height:5px;border-radius:50%;background:var(--amber);opacity:.5;animation:dp 2.2s infinite}
@keyframes dp{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}}

/* ── COUNTER (barra circular) ── */
#counter{
  position:fixed;bottom:20px;right:18px;
  width:60px;height:60px;
  z-index:10;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.circular-chart {
  display: block;
  width: 100%;
  height: 100%;
}
.circle-bg {
  stroke: rgba(0,217,176,0.15);
  stroke-width: 3;
  fill: none;
}
.circle {
  stroke: var(--teal);
  stroke-width: 3;
  fill: none;
  stroke-linecap: round;
  transition: stroke-dasharray 0.3s;
  filter: drop-shadow(0 0 6px var(--teal));
}
#counter-text {
  position:absolute;
  font-family:'Black Ops One',serif;
  font-size:0.9rem;
  color:var(--teal);
  text-shadow:0 0 10px var(--teal);
}

/* ── TOOLTIP mejorado ── */
#tip{
  position:fixed;pointer-events:none;z-index:200;
  background:rgba(7,12,22,0.95);border:1px solid var(--border-a);border-radius:6px;
  padding:8px 14px;font-family:'Rajdhani',sans-serif;
  font-size:0.8rem;font-weight:500;letter-spacing:0.05em;
  color:var(--amber);opacity:0;transition:opacity .2s;
  backdrop-filter:blur(10px);white-space:nowrap;
  box-shadow:0 0 20px rgba(255,140,42,0.2);
}
#tip small {
  display:block;
  font-size:0.65rem;
  color:var(--teal);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-top:2px;
}

/* ── INFO PANEL ── */
#panel{
  position:fixed;z-index:50;
  background:var(--panel);border:1px solid var(--border);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  transition:transform .44s cubic-bezier(.16,1,.3,1),opacity .32s;
  overflow:hidden;
}
@media(min-width:769px){
  #panel{
    top:50%;right:18px;width:316px;
    max-height:calc(100vh - 110px);border-radius:5px;
    transform:translateY(-50%) translateX(380px);opacity:0;
    overflow-y:auto;
  }
  #panel.open{transform:translateY(-50%) translateX(0);opacity:1}
}
@media(max-width:768px){
  #panel{
    bottom:0;left:0;right:0;max-height:68vh;
    border-radius:14px 14px 0 0;border-bottom:none;
    transform:translateY(100%);overflow-y:auto;
  }
  #panel.open{transform:translateY(0)}
}
.drag-bar{
  width:38px;height:4px;background:rgba(255,255,255,0.13);
  border-radius:2px;margin:11px auto 0;display:none;
}
@media(max-width:768px){.drag-bar{display:block}}
.pi{padding:20px 22px 26px}
.p-cat{font-size:0.6rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--teal);margin-bottom:7px;opacity:.8}
.p-name{font-family:'Black Ops One',serif;font-size:1.1rem;color:#fff;margin-bottom:3px;line-height:1.2}
.p-id{font-size:0.67rem;letter-spacing:.15em;color:var(--amber);margin-bottom:13px;font-weight:600}
.p-div{height:1px;background:linear-gradient(to right,var(--teal),transparent);opacity:.25;margin-bottom:13px}
.p-desc{font-size:0.87rem;line-height:1.62;color:var(--text);opacity:.87}
.p-stats{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sbox{background:rgba(0,217,176,0.04);border:1px solid rgba(0,217,176,0.11);border-radius:4px;padding:8px 11px}
.slbl{font-size:0.59rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:3px}
.sval{font-family:'Black Ops One',serif;font-size:0.84rem;color:var(--amber)}

.sch-sec{margin-top:16px}
.sch-lbl{font-size:0.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--teal);margin-bottom:7px;opacity:.7}
.sch-thumb{
  width:100%;border:1px solid rgba(0,217,176,0.18);border-radius:4px;
  background:#050e18;cursor:zoom-in;overflow:hidden;position:relative;
  transition:border-color .2s,box-shadow .2s;min-height:80px;
  display:flex;align-items:center;justify-content:center;
}
.sch-thumb:hover{border-color:var(--teal);box-shadow:var(--glow-t)}
.sch-thumb img{width:100%;height:auto;display:block;pointer-events:none}
.sch-zh{position:absolute;bottom:6px;right:8px;font-size:0.58rem;letter-spacing:.1em;color:rgba(0,217,176,0.6);text-transform:uppercase;background:rgba(3,5,8,.7);padding:2px 6px;border-radius:2px}
/* Info panel custom scrollbar */
#panel{overflow-y:auto;-webkit-overflow-scrolling:touch}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:rgba(0,217,176,0.2)}
#close-panel{
  position:absolute;top:14px;right:14px;background:none;border:none;
  color:var(--text-dim);font-size:1.1rem;cursor:pointer;line-height:1;
  transition:color .2s;z-index:2;
}
#close-panel:hover{color:var(--amber)}

/* ── SCHEMATIC MODAL (centered con transición) ── */
#sch-modal{
  position:fixed;inset:0;z-index:300;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:54px 20px;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity 0.25s ease, visibility 0.25s;
}
#sch-modal.open{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

#smc{
  max-width:980px;
  width:100%;
  max-height:calc(100vh - 108px);
  margin:0 auto;
  background:var(--panel);
  border:1px solid var(--border);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transform:scale(0.95);
  transition:transform 0.3s ease;
}
#sch-modal.open #smc {
  transform:scale(1);
}

#smh{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
#smt{font-family:'Black Ops One',serif;font-size:.88rem;color:var(--teal);letter-spacing:.08em}
#smclose{
  background:none;border:none;color:var(--text-dim);font-size:1.5rem;
  cursor:pointer;transition:color .2s;line-height:1;padding:4px 8px;
  -webkit-tap-highlight-color:transparent;
}
#smclose:hover{color:var(--amber)}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden}
.tab{
  padding:11px 22px;font-family:'Rajdhani',sans-serif;font-size:.77rem;
  font-weight:600;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;
  color:var(--text-dim);cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;
  -webkit-tap-highlight-color:transparent;flex:1;text-align:center;
}
.tab.on{color:var(--teal);border-bottom-color:var(--teal)}
.tab:hover:not(.on){color:var(--text)}
/* Flex column panes with scrollable content */
.tpane{display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden}
.tpane.on{display:flex}
#tpane-full{flex:1;min-height:0;overflow:hidden}
.pdf-wrap{width:100%;height:100%;display:flex;flex-direction:column;min-height:0}
.pdf-wrap iframe{flex:1;border:none;min-height:0}
/* On mobile, iframe PDF is unreliable — show open-button fallback prominently */
@media(max-width:640px){
  .pdf-wrap iframe{display:none}
  .pdf-mobile-bar{
    display:flex!important;
  }
}
.pdf-mobile-bar{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:36px 24px;text-align:center;flex:1;
}
.pdf-mobile-bar p{font-size:.85rem;color:var(--text-dim);line-height:1.6;max-width:300px}
.pdf-fallback{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center}
.pdf-fallback p{font-size:.85rem;color:var(--text-dim);line-height:1.6;max-width:340px}
.pdf-link{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 22px;background:var(--teal-dim);border:1px solid var(--border);border-radius:3px;
  color:var(--teal);font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;text-decoration:none;transition:all .2s;
}
.pdf-link:hover{background:rgba(0,217,176,0.2);border-color:var(--teal);box-shadow:var(--glow-t)}
#tpane-sec{
  flex:1;min-height:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:16px;
}
.sec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:480px){.sec-grid{grid-template-columns:1fr}}
.sec-card{
  background:rgba(0,217,176,0.03);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;cursor:zoom-in;transition:all 0.25s;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.sec-card:hover,.sec-card:active{
  border-color:var(--teal);
  box-shadow:var(--glow-t), 0 4px 12px rgba(0,217,176,0.2);
  transform:scale(1.02);
}
.sec-title{
  padding:9px 13px;font-size:.7rem;font-weight:600;letter-spacing:.15em;
  text-transform:uppercase;color:var(--teal);border-bottom:1px solid var(--border);
  background:rgba(0,217,176,0.04);display:flex;align-items:center;justify-content:space-between;
}
.sec-title-zoom{font-size:.58rem;opacity:.5;letter-spacing:.08em}
.sec-img-wrap{
  background:#050e18;
  overflow:hidden;
  min-height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.sec-img-wrap img{
  width:100%;
  height:auto;
  display:block;
  object-fit:cover;
  pointer-events:none;
  transition:transform 0.3s;
}
.sec-card:hover .sec-img-wrap img{
  transform:scale(1.05);
}
.sec-placeholder{padding:22px 16px;text-align:center;font-size:.74rem;color:rgba(180,204,216,.35);line-height:1.7}
.sec-placeholder code{display:block;margin-top:6px;color:rgba(0,217,176,.35);font-size:.68rem;word-break:break-all}
/* Padding del modal en móvil: dejar espacio para nav top y nav bottom */
@media(max-width:640px){
  #sch-modal{
    padding:58px 0 calc(72px + env(safe-area-inset-bottom)) 0;
  }
  #smc{
    border-radius:0;
    max-height:100%;
  }
}
.pdf-desktop-hint{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:7px 16px;background:rgba(0,217,176,0.04);border-bottom:1px solid rgba(0,217,176,.08);
  font-size:.67rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(0,217,176,.4);
  flex-shrink:0;
}
@media(max-width:640px){.pdf-desktop-hint{display:none}}

/* PDF desktop hint bar */
.pdf-desktop-hint{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:7px 16px;background:rgba(0,217,176,0.04);border-bottom:1px solid rgba(0,217,176,.08);
  font-size:.67rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(0,217,176,.4);
  flex-shrink:0;
}
@media(max-width:640px){.pdf-desktop-hint{display:none}}
/* ── PAN-ZOOM VIEWER ── */
#pz-viewer{
  position:fixed;inset:0;z-index:500;
  display:none;flex-direction:column;
  background:#030508;
}
#pz-viewer.open{display:flex}
#pz-topbar{
  position:absolute;top:0;left:0;right:0;height:52px;z-index:2;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;gap:12px;
  background:linear-gradient(to bottom,rgba(3,5,8,.97) 60%,transparent);
  pointer-events:none;
}
#pz-topbar > *{pointer-events:auto}
#pz-title{
  font-family:'Black Ops One',serif;font-size:.85rem;
  color:var(--teal);letter-spacing:.08em;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#pz-controls{display:flex;gap:6px;align-items:center}
.pz-btn{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:4px;
  background:rgba(7,9,15,0.8);border:1px solid rgba(0,217,176,.2);
  color:rgba(0,217,176,.7);cursor:pointer;transition:all .18s;font-size:1rem;
  -webkit-tap-highlight-color:transparent;
}
.pz-btn:hover{background:rgba(0,217,176,.15);color:var(--teal);border-color:var(--teal)}
.pz-close-btn{
  background:rgba(7,9,15,0.8);border:1px solid rgba(255,140,42,.2);
  color:rgba(255,140,42,.7);
}
.pz-close-btn:hover{background:rgba(255,140,42,.15);color:var(--amber);border-color:var(--amber)}
#pz-stage{
  flex:1;position:relative;overflow:hidden;
  cursor:grab;touch-action:none;
  display:flex;align-items:center;justify-content:center;
}
#pz-stage.dragging{cursor:grabbing}
#pz-content{
  position:absolute;top:0;left:0;
  transform-origin:0 0;
  will-change:transform;
}
#pz-img{
  display:block;max-width:none;
  user-select:none;-webkit-user-drag:none;pointer-events:none;
}
#pz-zoom-bar{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;
  background:rgba(3,5,8,.8);border:1px solid rgba(0,217,176,.15);
  border-radius:20px;padding:6px 14px;z-index:2;pointer-events:none;
}
#pz-zoom-val{
  font-family:'Black Ops One',serif;font-size:.72rem;
  color:rgba(0,217,176,.55);letter-spacing:.1em;min-width:42px;text-align:center;
}
#pz-hint-bar{
  position:absolute;bottom:56px;left:50%;transform:translateX(-50%);
  font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(180,204,216,.22);pointer-events:none;white-space:nowrap;
  animation:fadeHint 4s forwards;
}
@keyframes fadeHint{0%,60%{opacity:1}100%{opacity:0}}
@media(max-width:640px){#pz-hint-bar{display:none}}

/* Estilos para la pestaña BOM dentro del modal de esquemáticos */
#tpane-bom {
  flex:1;
  min-height:0;
  display:none;
  flex-direction:column;
  overflow:hidden;
}
#tpane-bom.on { display:flex; }
#bom-filter-bar-modal {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; border-bottom:1px solid rgba(255,140,42,.1);
  flex-shrink:0; flex-wrap:wrap;
}
#bom-scroll-modal {
  flex:1; min-height:0; overflow:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 16px;
}
#bom-summary-modal {
  margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap;
}
#bom-table-wrap-modal {
  overflow-x:auto;
}
/* Reutilizamos los mismos estilos de tabla que antes */
.bom-table{width:100%;border-collapse:collapse;font-size:.82rem}
.bom-table thead tr{
  background:rgba(255,140,42,0.07);
  border-bottom:1px solid var(--border-a);
}
.bom-table th{
  padding:10px 14px;text-align:left;font-family:'Rajdhani',sans-serif;
  font-size:.66rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--amber);white-space:nowrap;
}
.bom-table td{
  padding:9px 14px;color:var(--text);border-bottom:1px solid rgba(255,140,42,0.07);
  vertical-align:middle;
}
.bom-table tbody tr:hover{background:rgba(255,140,42,0.04)}
.bom-table tbody tr:last-child td{border-bottom:none}
/* Para móvil, convertir filas en bloques */
@media (max-width:640px) {
  .bom-table, .bom-table thead, .bom-table tbody, .bom-table tr, .bom-table td {
    display: block;
  }
  .bom-table thead {
    display: none;
  }
  .bom-table tr {
    margin-bottom: 1rem;
    background: rgba(255,140,42,0.02);
    border: 1px solid var(--border-a);
    border-radius: 4px;
    padding: 0.5rem;
  }
